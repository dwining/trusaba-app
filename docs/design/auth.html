<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TruSaba · Login & Sign Up</title>
  <link rel="stylesheet" href="trusaba.css" />
</head>
<body>
  <div class="stage">
    <div class="phone" data-od-id="phone-auth">
      <div class="status-bar"><span>9:41</span><span class="icons">●●● 100%</span></div>
      <div class="auth-toast" id="toast" data-od-id="auth-toast" role="status"></div>

      <div class="app-body no-nav" data-od-id="auth-body">
        <div class="auth-hero" data-od-id="auth-hero">
          <img class="logo-lg" src="logo.jpeg" alt="TruSaba" />
          <h1 data-od-id="auth-title">Selamat datang</h1>
          <p id="authSubtitle">Masuk untuk menyimpan itinerary AI & booking trip-mu.</p>
        </div>

        <div class="auth-tabs" data-od-id="auth-tabs" role="tablist">
          <button type="button" class="auth-tab active" role="tab" aria-selected="true" data-mode="login" data-od-id="tab-login">Masuk</button>
          <button type="button" class="auth-tab" role="tab" aria-selected="false" data-mode="signup" data-od-id="tab-signup">Daftar</button>
        </div>

        <div class="pad" style="padding-top:12px;padding-bottom:28px">
          <button type="button" class="btn-google" id="btnGoogle" data-od-id="btn-google">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Lanjutkan dengan Google
          </button>

          <div class="auth-divider">atau email</div>

          <!-- Login -->
          <form id="formLogin" data-od-id="form-login" novalidate>
            <div class="field">
              <label class="field-label" for="loginEmail">Email</label>
              <input class="input" id="loginEmail" type="email" autocomplete="email" placeholder="nama@email.com" required data-od-id="input-login-email" />
            </div>
            <div class="field">
              <label class="field-label" for="loginPass">Password</label>
              <div class="password-wrap">
                <input class="input" id="loginPass" type="password" autocomplete="current-password" placeholder="Minimal 8 karakter" required data-od-id="input-login-pass" />
                <button type="button" class="password-toggle" data-target="loginPass" aria-label="Tampilkan password">
                  <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <div class="row-between" style="margin-top:8px">
                <label class="small muted" style="display:flex;align-items:center;gap:6px;cursor:pointer">
                  <input type="checkbox" id="remember" style="accent-color:var(--accent-hex)" /> Ingat saya
                </label>
                <button type="button" class="btn btn-ghost btn-sm" id="btnForgot" data-od-id="btn-forgot" style="min-height:32px;padding:0 4px">Lupa password?</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" data-od-id="btn-login">Masuk</button>
            <p class="auth-footer">Belum punya akun? <a href="#" id="linkToSignup" data-od-id="link-to-signup">Daftar gratis</a></p>
          </form>

          <!-- Sign up -->
          <form id="formSignup" data-od-id="form-signup" hidden novalidate>
            <div class="field">
              <label class="field-label" for="signupName">Nama lengkap</label>
              <input class="input" id="signupName" type="text" autocomplete="name" placeholder="Nama kamu" required data-od-id="input-signup-name" />
            </div>
            <div class="field">
              <label class="field-label" for="signupEmail">Email</label>
              <input class="input" id="signupEmail" type="email" autocomplete="email" placeholder="nama@email.com" required data-od-id="input-signup-email" />
            </div>
            <div class="field">
              <label class="field-label" for="signupPass">Password</label>
              <div class="password-wrap">
                <input class="input" id="signupPass" type="password" autocomplete="new-password" placeholder="Minimal 8 karakter" required minlength="8" data-od-id="input-signup-pass" />
                <button type="button" class="password-toggle" data-target="signupPass" aria-label="Tampilkan password">
                  <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <p class="field-hint">Gunakan kombinasi huruf & angka agar lebih aman.</p>
            </div>
            <div class="field">
              <label class="small muted" style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;line-height:1.4">
                <input type="checkbox" id="terms" required style="accent-color:var(--accent-hex);margin-top:3px" />
                <span>Saya setuju dengan <strong style="color:var(--fg)">Syarat & Kebijakan Privasi</strong> TruSaba.</span>
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block" data-od-id="btn-signup">Buat akun</button>
            <p class="auth-footer">Sudah punya akun? <a href="#" id="linkToLogin" data-od-id="link-to-login">Masuk</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var formLogin = document.getElementById('formLogin');
      var formSignup = document.getElementById('formSignup');
      var tabs = document.querySelectorAll('.auth-tab');
      var subtitle = document.getElementById('authSubtitle');
      var toast = document.getElementById('toast');
      var mode = 'login';

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 1800);
      }

      function setMode(next) {
        mode = next;
        formLogin.hidden = next !== 'login';
        formSignup.hidden = next !== 'signup';
        tabs.forEach(function (t) {
          var on = t.getAttribute('data-mode') === next;
          t.classList.toggle('active', on);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        subtitle.textContent = next === 'login'
          ? 'Masuk untuk menyimpan itinerary AI & booking trip-mu.'
          : 'Buat akun gratis — AI TruSaba siap jadi travel companion-mu.';
        document.title = next === 'login' ? 'TruSaba · Login' : 'TruSaba · Sign Up';
      }

      tabs.forEach(function (t) {
        t.addEventListener('click', function () { setMode(t.getAttribute('data-mode')); });
      });
      document.getElementById('linkToSignup').addEventListener('click', function (e) {
        e.preventDefault();
        setMode('signup');
      });
      document.getElementById('linkToLogin').addEventListener('click', function (e) {
        e.preventDefault();
        setMode('login');
      });

      document.querySelectorAll('.password-toggle').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var input = document.getElementById(btn.getAttribute('data-target'));
          if (!input) return;
          input.type = input.type === 'password' ? 'text' : 'password';
        });
      });

      document.getElementById('btnForgot').addEventListener('click', function () {
        showToast('Link reset password dikirim ke email (demo).');
      });

      function goApp() {
        window.location.href = 'onboarding.html';
      }

      document.getElementById('btnGoogle').addEventListener('click', function () {
        showToast('Menghubungkan akun Google…');
        setTimeout(goApp, 900);
      });

      formLogin.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('loginEmail').value.trim();
        var pass = document.getElementById('loginPass').value;
        if (!email || !pass) {
          showToast('Email dan password wajib diisi.');
          return;
        }
        if (pass.length < 8) {
          showToast('Password minimal 8 karakter.');
          return;
        }
        showToast('Berhasil masuk…');
        setTimeout(goApp, 700);
      });

      formSignup.addEventListener('submit', function (e) {
        e.preventDefault();
        var name = document.getElementById('signupName').value.trim();
        var email = document.getElementById('signupEmail').value.trim();
        var pass = document.getElementById('signupPass').value;
        var terms = document.getElementById('terms').checked;
        if (!name || !email || !pass) {
          showToast('Lengkapi nama, email, dan password.');
          return;
        }
        if (pass.length < 8) {
          showToast('Password minimal 8 karakter.');
          return;
        }
        if (!terms) {
          showToast('Centang syarat & kebijakan dulu.');
          return;
        }
        showToast('Akun dibuat…');
        setTimeout(goApp, 700);
      });

      if (location.search.indexOf('mode=signup') !== -1) setMode('signup');
    })();
  </script>
</body>
</html>
