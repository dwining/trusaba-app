<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TruSaba · Pembayaran</title>
  <link rel="stylesheet" href="trusaba.css" />
</head>
<body>
  <div class="stage">
    <div class="phone" data-od-id="phone-payment">
      <div class="status-bar"><span>9:41</span><span class="icons">●●● 100%</span></div>
      <div class="app-header" data-od-id="payment-header">
        <a class="icon-btn" href="hotel-detail.html" aria-label="Kembali">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div class="title-block">
          <p class="eyebrow">Checkout</p>
          <h1>Ringkasan bayar</h1>
        </div>
      </div>

      <div class="app-body no-nav has-sticky" data-od-id="payment-body">
        <div class="pad">
          <div class="card" style="display:flex;gap:12px;margin-bottom:16px" data-od-id="payment-hotel-card">
            <div class="ph-img thumb" style="width:72px;height:72px;border-radius:12px;background:linear-gradient(145deg,oklch(0.55 0.1 255 / 0.3),oklch(0.8 0.08 200 / 0.4))"></div>
            <div style="flex:1;min-width:0">
              <h3>Seminyak Palm Hotel</h3>
              <p class="small muted">Superior Twin · 2 malam</p>
              <p class="caption" style="margin-top:4px">12–14 Agu 2026</p>
            </div>
          </div>

          <div class="card-soft stack-sm" data-od-id="payment-breakdown">
            <div class="row-between small"><span class="muted">Harga kamar (2×)</span><span class="mono">Rp 2.200.000</span></div>
            <div class="row-between small"><span class="muted">Pajak & service</span><span class="mono">Rp 220.000</span></div>
            <div class="row-between small"><span class="muted">Biaya platform</span><span class="mono">Rp 25.000</span></div>
            <div class="row-between small"><span class="muted">Diskon AI first book</span><span class="mono" style="color:var(--success)">− Rp 100.000</span></div>
            <div style="height:1px;background:var(--border);margin:6px 0"></div>
            <div class="row-between">
              <span style="font-weight:600">Total bayar</span>
              <span class="mono" style="font-size:18px;font-weight:600;color:var(--accent-hex)" data-od-id="payment-total">Rp 2.345.000</span>
            </div>
          </div>

          <h2 style="margin:20px 0 10px">Metode pembayaran</h2>
          <div class="stack" data-od-id="pay-methods">
            <label class="room-opt selected">
              <input type="radio" name="pay" checked />
              <div>
                <h3>E-Wallet</h3>
                <p class="small muted">GoPay · OVO · Dana · ShopeePay</p>
              </div>
            </label>
            <label class="room-opt">
              <input type="radio" name="pay" />
              <div>
                <h3>Transfer bank</h3>
                <p class="small muted">VA BCA · Mandiri · BNI</p>
              </div>
            </label>
            <label class="room-opt">
              <input type="radio" name="pay" />
              <div>
                <h3>Kartu kredit / debit</h3>
                <p class="small muted">Visa · Mastercard · JCB</p>
              </div>
            </label>
          </div>
        </div>
      </div>

      <div class="sticky-cta" data-od-id="payment-cta">
        <a class="btn btn-primary btn-block" href="booking-success.html" data-od-id="btn-bayar">Bayar Sekarang</a>
      </div>
    </div>
  </div>
  <script>
    document.querySelectorAll('#pay-methods .room-opt, [data-od-id="pay-methods"] .room-opt').forEach(function (el) {
      el.addEventListener('click', function () {
        el.parentElement.querySelectorAll('.room-opt').forEach(function (x) { x.classList.remove('selected'); });
        el.classList.add('selected');
        el.querySelector('input').checked = true;
      });
    });
  </script>
</body>
</html>
