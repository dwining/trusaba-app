<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TruSaba · Splash</title>
  <link rel="stylesheet" href="trusaba.css" />
</head>
<body>
  <div class="stage">
    <div class="phone" data-od-id="phone-splash">
      <div class="splash-bg" aria-hidden="true"></div>

      <div class="splash-body" data-od-id="splash-body">
        <div class="splash-aura" data-od-id="splash-aura">
          <div class="splash-ring"></div>
          <div class="splash-ring-inner"></div>
          <img class="splash-logo" src="logo.jpeg" alt="TruSaba" />
        </div>

        <h1 class="splash-title" data-od-id="splash-title">TruSaba</h1>
        <p class="splash-tagline" data-od-id="splash-tagline">
          AI travel companion kamu — trip personal, dari rencana sampai pulang
        </p>
        <div class="splash-accent-line" aria-hidden="true"></div>
      </div>

      <p class="splash-version">v1.0</p>
    </div>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = 'auth.html';
    }, 2600);
  </script>
</body>
</html>
