<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TruSaba · Detail Hotel</title>
  <link rel="stylesheet" href="trusaba.css" />
</head>
<body>
  <div class="stage">
    <div class="phone" data-od-id="phone-hotel">
      <div class="status-bar" style="position:absolute;left:0;right:0;z-index:5;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35)"><span>9:41</span><span class="icons">●●● 100%</span></div>
      <div style="position:relative" data-od-id="hotel-hero">
        <div class="ph-img hero-img" style="height:220px;background:linear-gradient(160deg,oklch(0.55 0.12 255 / 0.45),oklch(0.75 0.1 200 / 0.5)),oklch(0.7 0.06 220);align-items:flex-end;padding:16px;color:#fff;font-size:12px;letter-spacing:0.06em;text-transform:uppercase">Seminyak · Pool view</div>
        <a class="icon-btn" href="itinerary.html" aria-label="Kembali" style="position:absolute;top:48px;left:16px;background:oklch(1 0 0 / 0.9);z-index:6" data-od-id="btn-back-hotel">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
      </div>

      <div class="app-body has-sticky no-nav" style="padding-bottom:100px" data-od-id="hotel-body">
        <div class="pad" style="padding-top:16px">
          <div class="row-between" style="align-items:flex-start;margin-bottom:6px">
            <div>
              <span class="badge badge-gold">AI Recommend</span>
              <h1 style="margin-top:8px" data-od-id="hotel-name">Seminyak Palm Hotel</h1>
              <p class="small muted" style="margin-top:4px">Jl. Kayu Aya No. 18 · 4.8 ★ (1.2rb ulasan)</p>
            </div>
          </div>
          <p class="mono" style="font-size:20px;font-weight:600;color:var(--accent-hex);margin:12px 0 4px" data-od-id="hotel-price">Rp 1.100.000 <span class="small muted" style="font-weight:500;font-size:13px;color:var(--muted)">/ malam</span></p>
          <p class="small muted">Termasuk sarapan · free cancel 24 jam</p>

          <h2 style="margin:20px 0 10px" data-od-id="room-title">Pilih jenis kamar</h2>
          <div class="stack" data-od-id="room-options">
            <label class="room-opt selected" data-od-id="room-superior">
              <input type="radio" name="room" value="superior" checked />
              <div style="flex:1">
                <h3>Superior Twin</h3>
                <p class="small muted">2 twin bed · 24 m² · balcony</p>
                <p class="mono small" style="font-weight:600;margin-top:4px;color:var(--accent-hex)">Rp 1.100.000</p>
              </div>
            </label>
            <label class="room-opt" data-od-id="room-deluxe">
              <input type="radio" name="room" value="deluxe" />
              <div style="flex:1">
                <h3>Deluxe King</h3>
                <p class="small muted">1 king bed · 32 m² · pool view</p>
                <p class="mono small" style="font-weight:600;margin-top:4px;color:var(--accent-hex)">Rp 1.450.000</p>
              </div>
            </label>
            <label class="room-opt" data-od-id="room-suite">
              <input type="radio" name="room" value="suite" />
              <div style="flex:1">
                <h3>Garden Suite</h3>
                <p class="small muted">1 king · 45 m² · private garden</p>
                <p class="mono small" style="font-weight:600;margin-top:4px;color:var(--accent-hex)">Rp 1.900.000</p>
              </div>
            </label>
          </div>

          <h2 style="margin:20px 0 10px">Tanggal menginap</h2>
          <div class="row" style="gap:10px;margin-bottom:20px" data-od-id="stay-dates">
            <div style="flex:1">
              <span class="caption">Check-in</span>
              <input class="input" type="date" value="2026-08-12" id="ci" />
            </div>
            <div style="flex:1">
              <span class="caption">Check-out</span>
              <input class="input" type="date" value="2026-08-14" id="co" />
            </div>
          </div>
          <p class="caption" id="nights">2 malam</p>
        </div>
      </div>

      <div class="sticky-cta" data-od-id="hotel-cta">
        <a class="btn btn-primary btn-block" href="payment.html" data-od-id="btn-lanjut-bayar">Lanjut ke Pembayaran</a>
      </div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.room-opt').forEach(function (el) {
      el.addEventListener('click', function () {
        document.querySelectorAll('.room-opt').forEach(function (x) { x.classList.remove('selected'); });
        el.classList.add('selected');
        el.querySelector('input').checked = true;
      });
    });
    function nights() {
      var a = new Date(document.getElementById('ci').value);
      var b = new Date(document.getElementById('co').value);
      var n = Math.max(1, Math.round((b - a) / 86400000));
      document.getElementById('nights').textContent = n + ' malam';
    }
    document.getElementById('ci').addEventListener('change', nights);
    document.getElementById('co').addEventListener('change', nights);
  </script>
</body>
</html>
